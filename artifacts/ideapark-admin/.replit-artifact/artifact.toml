kind = "web"
previewPath = "/"
title = "IdeaPark Admin"
version = "1.0.0"
id = "artifacts/ideapark-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19079

[services.development]
run = "pnpm --filter @workspace/ideapark-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ideapark-admin", "run", "build" ]
publicDir = "artifacts/ideapark-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19079"
BASE_PATH = "/"
